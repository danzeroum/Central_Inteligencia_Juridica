# Alembic — configuração de migrações
# URL real vem de DATABASE_URL (env) injetada em alembic/env.py.
# O valor abaixo é apenas placeholder para o modo offline.

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# Placeholder — sobrescrito por DATABASE_URL em alembic/env.py
sqlalchemy.url = postgresql://cij:changeme@localhost:5432/cij

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
