# Regras de alerta Prometheus — Central de Inteligência Jurídica
#
# OBSERVABILITY (audit §6.1): a auditoria apontou "30+ métricas Prometheus mas
# SEM alertas configurados". Estas regras fecham essa lacuna cobrindo
# disponibilidade, taxa de erro, resiliência (circuit breaker) e backlog HITL.
# Os nomes de métrica correspondem aos definidos em src/utils/* e src/tools/*.

groups:
  - name: cij-availability
    rules:
      - alert: APITargetDown
        expr: up{job="agent-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API de agentes inacessível"
          description: "O alvo {{ $labels.instance }} está down há mais de 2 minutos."

  - name: cij-errors
    rules:
      - alert: HighErrorRate
        # Razão de erros sobre tarefas processadas (janela de 5m). O guard no
        # denominador evita disparo/NaN quando não há tráfego.
        expr: |
          sum(rate(api_errors_total[5m]))
            /
          sum(rate(tribunal_tasks_total[5m])) > 0.1
          and sum(rate(tribunal_tasks_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taxa de erro da API acima de 10%"
          description: "Mais de 10% das tarefas estão resultando em erro nos últimos 5m."

  - name: cij-resilience
    rules:
      - alert: CircuitBreakerOpen
        # circuit_breaker_state: 0=closed, 0.5=half_open, 1=open.
        expr: max by (name) (circuit_breaker_state) >= 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker aberto: {{ $labels.name }}"
          description: "O circuit breaker '{{ $labels.name }}' está OPEN há mais de 1m."

  - name: cij-hitl
    rules:
      - alert: HITLQueueBacklog
        expr: hitl_queue_depth > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backlog de aprovações HITL"
          description: "A fila HITL tem {{ $value }} pendências há mais de 10m."

      - alert: HITLSlowResponse
        # P90 do tempo de resposta humano acima de 5 min (janela de 15m).
        expr: |
          histogram_quantile(
            0.9, sum(rate(hitl_response_time_seconds_bucket[15m])) by (le)
          ) > 300
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Resposta HITL lenta (P90 > 5min)"
          description: "O P90 do tempo de decisão humana excedeu 5 minutos."

  # ===== Onda 1: Alertas de Integrações Jurídicas =====
  - name: cij-integrations
    rules:
      - alert: IntegrationSourceDown
        # Fonte com circuit breaker aberto (integração indisponível).
        expr: circuit_breaker_state{name=~"integration_.*"} >= 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Fonte de integração com falha: {{ $labels.name }}"
          description: >
            O circuit breaker '{{ $labels.name }}' está OPEN há mais de 2m.
            Verificar conectividade com a fonte de dados correspondente.

      - alert: IntegrationHighFailureRate
        # Mais de 20% das consultas falhando (janela 5m, com proteção de tráfego mínimo).
        expr: |
          sum by (source) (rate(integrations_queries_total{status="failed"}[5m]))
            /
          sum by (source) (rate(integrations_queries_total[5m])) > 0.2
          and sum by (source) (rate(integrations_queries_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de falha na integração: {{ $labels.source }}"
          description: "Fonte {{ $labels.source }} com mais de 20% de falhas nos últimos 5m."

      - alert: IntegrationHighLatency
        # P90 de latência acima de 5s (janela 5m).
        expr: |
          histogram_quantile(
            0.9, sum by (source, le) (rate(integrations_latency_seconds_bucket[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latência alta na integração: {{ $labels.source }}"
          description: "P90 da latência de {{ $labels.source }} excedeu 5s nos últimos 5m."

      - alert: IntegrationMockInProduction
        # Fonte em modo mock sendo consultada em produção.
        expr: |
          sum by (source) (
            increase(integrations_queries_total{data_mode="mock"}[5m])
          ) > 0 and on() count(up{job="agent-api"}) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Integração em modo MOCK: {{ $labels.source }}"
          description: >
            Fonte {{ $labels.source }} está operando em modo mock.
            Verifique se INTEGRATIONS_{{ $labels.source | upper }}_MODE=real está configurado.
