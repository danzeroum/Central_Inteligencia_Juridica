openapi: 3.0.3
info:
  title: Central de Inteligência Jurídica - SupervisorAgent API
  description: API que expõe a funcionalidade do SupervisorAgent para processamento de tarefas de texto relacionadas ao domínio jurídico.
  version: 1.0.0
  contact:
    name: Equipe de Desenvolvimento
servers:
  - url: /api/v1
    description: Servidor principal (path base inclui versionamento)
paths:
  /tasks:
    post:
      summary: Submete uma nova tarefa para processamento pelo SupervisorAgent.
      description: Recebe uma descrição de tarefa em texto livre e retorna um resultado estruturado contendo informações sobre tribunais, operações e dados relevantes.
      operationId: processTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_description
              properties:
                task_description:
                  type: string
                  description: A descrição da tarefa a ser processada pelo agente.
                  example: "Verificar o status do sistema do TJSP."
      responses:
        '200':
          description: Tarefa processada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessfulTaskResponse'
        '400':
          description: Requisição inválida (ex., corpo da requisição malformado ou campo 'task_description' vazio).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Erro interno do servidor durante o processamento da tarefa.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  schemas:
    SuccessfulTaskResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
          example: success
        supervisor_result:
          type: object
          properties:
            tribunal:
              type: string
              example: "TJSP"
            operation:
              type: string
              example: "status_check"
            data:
              type: object
              example: { "status": "operacional", "ultima_atualizacao": "2024-01-15", "mensagem": "Sistema normal" }
            timestamp:
              type: string
              format: date-time
              example: "2025-09-27T18:30:00.123Z"
        tribunal_used:
          type: string
          example: "TJSP"
    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          format: uri
          description: "Um URI de referência que identifica o tipo de problema."
          example: "https://api.centraljuridica.com/docs/errors#invalid-input"
        title:
          type: string
          description: "Uma descrição curta e legível por humanos do tipo de problema."
          example: "Invalid Input"
        status:
          type: integer
          format: int32
          description: "O código de status HTTP gerado pelo servidor para esta ocorrência do problema."
          example: 400
        detail:
          type: string
          description: "Uma explicação legível por humanos específica para esta ocorrência do problema."
          example: "O campo 'task_description' é obrigatório e não pode estar vazio."
        instance:
          type: string
          format: uri
          description: "Um URI que identifica a ocorrência específica do problema."
          example: "/api/v1/tasks"
        traceId:
          type: string
          description: "Um identificador único para correlação do erro (ex., em logs)."
          example: "abc-123-xyz"
