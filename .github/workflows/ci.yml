name: CI - Central de Inteligencia Juridica

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint-and-test:
    name: Python Lint + Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    # Onda 2: banco relacional disponível para alembic upgrade head + testes DB.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cij_test
          POSTGRES_USER: cij
          POSTGRES_PASSWORD: ci_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check syntax (compile all)
        run: |
          python -c "import compileall; compileall.compile_dir('src', quiet=True, force=True)"
          echo "All .py files compile successfully"

      - name: Run Alembic migrations (alembic upgrade head)
        env:
          DATABASE_URL: postgresql://cij:ci_test_password@localhost:5432/cij_test
          PYTHONPATH: .
        run: |
          alembic upgrade head
          echo "Alembic migrations applied successfully"

      - name: Run Bandit security scan
        run: |
          # SECURITY: falhas de severidade ALTA quebram o build (sem "|| true").
          # Avisos de severidade média/baixa são reportados mas não bloqueiam.
          bandit -r src/ -x tests/ --severity-level high --confidence-level high
          bandit -r src/ -x tests/ -ll || echo "WARNING: avisos de severidade media/baixa (nao bloqueiam)"
          echo "Security scan completed"

      - name: Check formatting (black --check)
        run: |
          # BLOQUEANTE: formatação inconsistente quebra o build. Rode `black src/ tests/`.
          black --check src/ tests/

      - name: Type check (mypy)
        run: |
          # Type checking básico. Ainda não bloqueia o build (typing incremental).
          mypy src/ --ignore-missing-imports --no-error-summary || echo "WARNING: mypy reportou avisos de tipagem (nao bloqueiam ainda)"

      - name: Run unit tests with coverage threshold
        env:
          ENVIRONMENT: test
        run: |
          # Cobertura mínima imposta no CI (barreira anti-regressão).
          # Sprint 1: 50% | Sprint 2: 65% | Sprint 3: 80%
          python -m pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Run integration tests
        env:
          ENVIRONMENT: test
        run: |
          python -m pytest tests/integration/ -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: central-inteligencia-juridica:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: gitleaks (árvore atual, sem histórico)
        run: |
          # SECURITY (MED-009): detecta segredos commitados acidentalmente.
          # --no-git escaneia apenas os arquivos versionados na árvore atual
          # (não reescreve nem varre o histórico), com allowlist em .gitleaks.toml.
          # Binário pinado em vez de Docker image (determinístico e sem
          # ambiguidade de tag/namespace).
          GL_VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git --redact --verbose \
            --config .gitleaks.toml

  dependency-scan:
    name: Dependency & FS Scan (pip-audit + Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (vulnerabilidades em dependências)
        # Advisory: reporta para triagem, não bloqueia o build (segurança
        # incremental, alinhado ao mypy). continue-on-error garante verde mesmo
        # com findings. Para tornar gate, remova continue-on-error.
        continue-on-error: true
        run: |
          # SECURITY: varre as dependências (PyPI Advisory DB / OSV).
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --desc

      - name: Trivy (filesystem + dependências, HIGH/CRITICAL)
        # Instalação via script oficial (determinística — sem depender da
        # resolução de uma action do marketplace). Advisory/não-bloqueante.
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --no-progress --exit-code 0 .

  frontend:
    name: Frontend Lint + Test + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (gate anti-XSS — innerHTML/no-danger)
        run: npm run lint

      - name: Vitest (auth/cliente)
        run: npm test

      - name: Build da SPA
        run: npm run build
