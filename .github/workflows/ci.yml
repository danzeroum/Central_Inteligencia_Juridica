name: CI - Central de Inteligencia Juridica

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint-and-test:
    name: Python Lint + Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check syntax (compile all)
        run: |
          python -c "import compileall; compileall.compile_dir('src', quiet=True, force=True)"
          echo "All .py files compile successfully"

      - name: Run Bandit security scan
        run: |
          # SECURITY: falhas de severidade ALTA quebram o build (sem "|| true").
          # Avisos de severidade média/baixa são reportados mas não bloqueiam.
          bandit -r src/ -x tests/ --severity-level high --confidence-level high
          bandit -r src/ -x tests/ -ll || echo "WARNING: avisos de severidade media/baixa (nao bloqueiam)"
          echo "Security scan completed"

      - name: Check formatting (black --check)
        run: |
          black --check src/ tests/ || echo "WARNING: Some files need formatting. Run: black src/ tests/"

      - name: Type check (mypy)
        run: |
          # Type checking básico. Ainda não bloqueia o build (typing incremental).
          mypy src/ --ignore-missing-imports --no-error-summary || echo "WARNING: mypy reportou avisos de tipagem (nao bloqueiam ainda)"

      - name: Run unit tests with coverage threshold
        env:
          ENVIRONMENT: test
        run: |
          # Cobertura mínima imposta no CI (barreira anti-regressão).
          python -m pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=30

      - name: Run integration tests
        env:
          ENVIRONMENT: test
        run: |
          python -m pytest tests/integration/ -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: central-inteligencia-juridica:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
