# DT-10 (S-C.3): este workflow complementa ci.yml com jobs adicionais específicos para PRs
# (docker smoke test e frontend build) e usa uma matrix de Python para garantir
# compatibilidade cross-version antes do merge. ci.yml é o gate principal para pushes
# em branches protegidas (main/master/develop). Ambos são mantidos intencionalmente:
# ci-on-pr.yml = validação completa pré-merge; ci-on-push.yml = feedback rápido em branches.
name: CI — Pull Request (full suite)

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  full-test:
    name: Full Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -sf http://localhost:8000/api/v1/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      CHROMA_HOST: localhost
      CHROMA_PORT: "8000"
      ENVIRONMENT: test
      VECTOR_MEMORY_MODE: disabled

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -c "import compileall; compileall.compile_dir('src', quiet=True, force=True)"

      - name: Bandit (HIGH/CRITICAL — bloqueante)
        run: bandit -r src/ -x tests/ --severity-level high --confidence-level high

      - name: Formatting check (black)
        run: black --check src/ tests/

      - name: Type check (mypy — advisory)
        run: mypy src/ --ignore-missing-imports --no-error-summary || echo "WARNING: mypy avisos"

      - name: Unit + Integration tests (coverage ≥ 65%)
        run: |
          python -m pytest tests/unit/ tests/integration/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=65

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pr-${{ github.sha }}
          path: coverage.xml
          retention-days: 7

  docker-smoke:
    name: Docker Build + Smoke
    runs-on: ubuntu-latest
    needs: full-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (smoke)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cij:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (anti-XSS gate)
        run: npm run lint

      - name: Vitest
        run: npm test

      - name: Build SPA
        run: npm run build
