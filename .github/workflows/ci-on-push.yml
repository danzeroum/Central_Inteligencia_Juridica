name: CI — Push (lint + unit tests)

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  lint-and-unit:
    name: Lint + Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      ENVIRONMENT: test
      VECTOR_MEMORY_MODE: disabled

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -c "import compileall; compileall.compile_dir('src', quiet=True, force=True)"

      - name: Ruff lint
        run: ruff check src/ tests/ || echo "WARNING: ruff não instalado, skip"

      - name: Bandit (HIGH/CRITICAL — bloqueante)
        run: bandit -r src/ -x tests/ --severity-level high --confidence-level high

      - name: Secret scan (gitleaks)
        run: |
          GL_VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git --redact --config .gitleaks.toml

      - name: Type check (mypy — advisory)
        run: mypy src/ --ignore-missing-imports --no-error-summary || echo "WARNING: mypy avisos"

      - name: Unit tests (coverage ≥ 50%)
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-push-${{ github.sha }}
          path: coverage.xml
          retention-days: 3
