title = "gitleaks — Central Inteligência Jurídica"

# Estende as regras padrão do gitleaks (cobre AWS, tokens, chaves privadas, etc.).
[extend]
useDefault = true

[allowlist]
description = "Falsos positivos conhecidos: templates, fixtures de teste e exemplos"
# Caminhos sem segredos reais — placeholders/valores de exemplo.
paths = [
  '''\.env\.example$''',
  '''(^|/)tests/''',
  '''(^|/)examples/''',
  '''(^|/)docs/''',
]
# Strings de baixa entropia usadas como segredo fictício em testes/dev.
regexes = [
  '''x{16,}''',
  '''(prodpass|devpass|admin)''',
  # Chave-exemplo de handshake WebSocket da RFC 6455 §1.2 ("the sample nonce"),
  # usada no smoke test — não é um segredo.
  '''dGhlIHNhbXBsZSBub25jZQ==''',
]
