# DMN-02 — Roteamento de Fonte de Dados (governança)
#
# Codifica a REGRA ARQUITETURAL CJ-001:
#   🚨 "O LLM ANALISA. A API REAL FORNECE OS DADOS. Nunca o contrário."
#
# Esta é a fonte ÚNICA de verdade sobre, para cada tipo de dado:
#   - fonte  : a origem AUTORIZADA do dado (API real / base determinística)
#   - llm    : o papel permitido do LLM sobre aquele dado
#              (analise | sumarizacao | nao | nunca | exclusivo)
#   - critico: se true, o LLM NUNCA pode ser a FONTE do dado (hard block)
#   - cache_ttl: TTL recomendado de cache para aquele tipo
#
# Alterar política = editar este arquivo (nenhuma mudança de código).
# A engine que lê e aplica este arquivo é src/governance/data_source_policy.py.

data_types:
  legislacao:
    fonte: "Planalto / LexML"
    llm: analise            # LLM só interpreta o texto retornado pela API
    critico: true
    cache_ttl: "7d"

  jurisprudencia:
    fonte: "CNJ DataJud"     # ver ADR-013 / src/services/datajud_client.py
    llm: sumarizacao         # LLM só sumariza/extrai ratio decidendi
    critico: true
    cache_ttl: "24h"

  indice_economico:
    fonte: "BCB / IBGE"
    llm: nao
    critico: true
    cache_ttl: "1h"

  honorarios:
    fonte: "Tabela OAB"
    llm: nao
    critico: true
    cache_ttl: "30d"

  prazo_processual:
    fonte: "CPC/CLT (base local determinística)"
    llm: nao                 # cálculo é determinístico, nunca do LLM
    critico: true
    cache_ttl: "infinito"

  dado_mercado_financeiro:
    fonte: "Alpha Vantage / Finnhub"
    llm: nunca
    critico: true
    cache_ttl: "5min"

  interpretacao:
    fonte: "LLM"             # análise/estratégia é exatamente o papel do LLM
    llm: exclusivo
    critico: false
    cache_ttl: "n/a"

  # ===== Onda 1: Integrações Jurídicas =====

  processo_por_numero:
    fonte: "CNJ DataJud"
    llm: sumarizacao
    critico: true
    cache_ttl: "1h"
    zone: publica

  publicacao_dje:
    fonte: "DJEN / Comunica PJe"
    llm: sumarizacao
    critico: true
    cache_ttl: "30min"
    zone: publica

  cadastro_empresa:
    fonte: "Receita Federal / BrasilAPI"
    llm: analise
    critico: true
    cache_ttl: "24h"
    zone: publica

  eleitoral:
    fonte: "TSE Dados Abertos"
    llm: analise
    critico: true
    cache_ttl: "24h"
    zone: publica

  protesto:
    fonte: "CRC / CENPROT"
    llm: nao
    critico: true
    cache_ttl: "15min"
    zone: restrita

  cadin:
    fonte: "CADIN / Receita Federal"
    llm: nao
    critico: true
    cache_ttl: "15min"
    zone: restrita

  imovel:
    fonte: "ONR / SREI"
    llm: nao
    critico: true
    cache_ttl: "15min"
    zone: restrita

  # ===== Onda 2: SPED (preparação arquitetural) =====

  sped_regularidade:
    fonte: "SPED / Receita Federal"
    llm: nao
    critico: true
    cache_ttl: "24h"
    zone: credenciada

  # ===== SAUDE-01: Sentinela Respiratória (SIH-RD DATASUS) =====

  internacoes_respiratorias:
    fonte: "DATASUS / SIH-RD (ftp.datasus.gov.br)"
    llm: nao                  # contagem de AIH é determinística — LLM não participa
    critico: false            # dado público; não é credencial nem dado pessoal
    cache_ttl: "30d"          # competências fechadas mudam raramente após 2 meses
    zone: publica
    protocolo: ftp-anonimo    # ver ADR-017; DATASUS não oferece SFTP/HTTPS
    colunas_produto:          # colunas selecionadas (sem PII — LGPD)
      - MUNIC_RES
      - MUNIC_MOV
      - DIAG_PRINC
      - DT_INTER
      - ANO_CMPT
      - MES_CMPT
    colunas_excluidas:        # quasi-identificadores — NUNCA versionar
      - CPF_AUT
      - GESTOR_CPF
      - NASC
    supressao_k_anonimato: 5  # CNS 510/2016; células < 5 → None + suprimido=True
