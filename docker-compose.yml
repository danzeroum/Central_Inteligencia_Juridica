version: "3.9"

services:
  agent-system:
    image: python:3.11-slim
    container_name: multi-agent-system
    working_dir: /app
    command: ["sleep", "infinity"]
    ports:
      - "8080:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TJSP_API_TOKEN=${TJSP_API_TOKEN:-}
      - TJMG_API_KEY=${TJMG_API_KEY:-}
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-3}
      - CIRCUIT_BREAKER_TIMEOUT_SECONDS=${CIRCUIT_BREAKER_TIMEOUT_SECONDS:-60}
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: tribunal-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  chromadb_data:
