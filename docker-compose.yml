version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tribunal-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  agent-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-system
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  agent-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-tests
    command: ["pytest", "-v", "--tb=short", "tests/"]
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    profiles:
      - test
