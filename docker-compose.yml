version: '3.8'

services:
  agent-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-system
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - redis

  agent-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-tests
    working_dir: /app
    command: ["pytest", "-v"]
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      - agent-system
      - redis

  redis:
    image: redis:7-alpine
    container_name: tribunal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: