version: '3.8'

services:
  agent-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-system
    volumes:
      - ./src:/app/src:ro
    working_dir: /app
    command: python src/agents/supervisor_agent.py
    environment:
      - PYTHONPATH=/app/src
    restart: unless-stopped
    depends_on:
      - redis

  agent-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-tests
    working_dir: /app
    command: ["pytest", "tests/", "-v"]
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    depends_on:
      - agent-system
      - redis

  redis:
    image: redis:7-alpine
    container_name: tribunal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
