services:
  agent-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: central-inteligencia-juridica
    # Sem host-port: acesso externo passa SOMENTE pelo ingress nginx (TLS).
    expose:
      - "8000"
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./config:/app/config:ro          # personas YAML (legal_areas.py / Item 5-6)
      - ./data:/app/data:ro              # documentos de seed (ingest_kb.py / A7)
      - ./scripts:/app/scripts:ro        # CLI de ingestão e utilitários
      - ./logs:/app/logs
      - vector_memory_data:/app/.vector_memory
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # read_only root FS: direciona caches graváveis (modelos, HF) para o tmpfs.
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/cache
      - HF_HOME=/tmp/hf
      - TRANSFORMERS_CACHE=/tmp/hf
      - SENTENCE_TRANSFORMERS_HOME=/tmp/hf
      - VECTOR_MEMORY_PERSIST_PATH=/app/.vector_memory
      # "local" usa PersistentClient (sem servidor externo). "none" desativa a memória.
      # Sem esta linha o padrão "auto" tenta HTTP remoto 3× (backoff 2+4 s) causando 504.
      - VECTOR_MEMORY_MODE=${VECTOR_MEMORY_MODE:-local}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # SECURITY: JWT_SECRET é OBRIGATÓRIO (mín. 32 chars). Sem ele a app não sobe.
      - JWT_SECRET=${JWT_SECRET:?defina JWT_SECRET no .env (veja .env.example)}
      - AUTH_REQUIRED=${AUTH_REQUIRED:-true}
      # Store de usuários (JSON). Veja .env.example para o formato correto.
      - AUTH_USERS=${AUTH_USERS:-}
      # Aponta o cache/A2A para o serviço redis (não localhost) e usa a senha.
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}
      # CLOUD-READINESS: backends de estado compartilhado. Padrão single-node;
      # ligue para 'redis' ao escalar horizontalmente (multi-réplica).
      - RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-memory}
      - LEDGER_BACKEND=${LEDGER_BACKEND:-file}
      - HITL_BACKEND=${HITL_BACKEND:-memory}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - CACHE_ENCRYPTION_ENABLED=${CACHE_ENCRYPTION_ENABLED:-false}
      - CACHE_ENCRYPTION_KEY=${CACHE_ENCRYPTION_KEY:-}
      # Onda 1: Camada de Integrações Jurídicas.
      # Modo padrão mock para desenvolvimento; defina =real para produção.
      - INTEGRATIONS_DATAJUD_MODE=${INTEGRATIONS_DATAJUD_MODE:-mock}
      - INTEGRATIONS_DJEN_MODE=${INTEGRATIONS_DJEN_MODE:-mock}
      - INTEGRATIONS_RECEITA_CNPJ_MODE=${INTEGRATIONS_RECEITA_CNPJ_MODE:-mock}
      - INTEGRATIONS_TSE_MODE=${INTEGRATIONS_TSE_MODE:-mock}
      - INTEGRATIONS_CRC_PROTESTOS_MODE=${INTEGRATIONS_CRC_PROTESTOS_MODE:-mock}
      - INTEGRATIONS_CADIN_MODE=${INTEGRATIONS_CADIN_MODE:-mock}
      - INTEGRATIONS_ONR_IMOVEIS_MODE=${INTEGRATIONS_ONR_IMOVEIS_MODE:-mock}
      # Chaves de API — deixe vazio em mock; configure no .env para =real
      - INTEGRATIONS_DATAJUD_API_KEY=${INTEGRATIONS_DATAJUD_API_KEY:-}
      - INTEGRATIONS_DJEN_API_KEY=${INTEGRATIONS_DJEN_API_KEY:-}
      - INTEGRATIONS_TSE_API_KEY=${INTEGRATIONS_TSE_API_KEY:-}
      # LLM (DeepSeek / OpenAI / compatível). Sem OPENAI_API_KEY o IntentClassifier
      # usa fallback heurístico determinístico (llm_enabled=False).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      # ChromaDB (RAG — Item 11/12). VECTOR_MEMORY_MODE=local usa PersistentClient
      # embutido (padrão, single-node). Para escalar horizontalmente defina
      # VECTOR_MEMORY_MODE=remote, CHROMA_HOST=chromadb e suba com
      # --profile chromadb.
      - CHROMA_HOST=${CHROMA_HOST:-localhost}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      # DataJud (CNJ) — jurisprudência real. Sem chave usa mock automaticamente.
      - DATAJUD_API_KEY=${DATAJUD_API_KEY:-}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      redis:
        condition: service_started
      prometheus:
        condition: service_started
      chromadb:
        condition: service_healthy
        required: false
    networks:
      - cij_internal
      - btv-prod-net

  redis:
    image: redis:7-alpine
    container_name: tribunal-redis
    # SECURITY (SEC-003/CWE-306): Redis exige autenticação. Sem REDIS_PASSWORD
    # o compose falha em vez de subir um Redis aberto.
    # user: redis evita setuid (cap_drop: ALL bloqueia setresuid no entrypoint).
    user: redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - cij_internal

  prometheus:
    # Imagem fixada (sem :latest) para builds reproduzíveis e proteção contra drift.
    image: prom/prometheus:v2.54.1
    container_name: tribunal-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - cij_internal

  alertmanager:
    # OBSERVABILITY: roteia/silencia os alertas disparados pelo Prometheus.
    image: prom/alertmanager:v0.27.0
    container_name: tribunal-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - cij_internal

  grafana:
    # Imagem fixada (sem :latest).
    image: grafana/grafana:11.2.0
    container_name: tribunal-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      # SECURITY (QAL-001/CWE-798): sem credenciais hardcoded. O usuário tem
      # default "admin", mas a senha é OBRIGATÓRIA via .env (sem fallback) —
      # docker compose falha se GF_SECURITY_ADMIN_PASSWORD não estiver definida.
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?defina GF_SECURITY_ADMIN_PASSWORD no .env (veja .env.example)}
    depends_on:
      - prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - cij_internal

  # ChromaDB externo (RAG knowledge-base — Item 11-13).
  # Só necessário quando VECTOR_MEMORY_MODE=remote (escalonamento horizontal).
  # Ative com: docker compose --profile chromadb up
  # E defina no .env: VECTOR_MEMORY_MODE=remote CHROMA_HOST=chromadb
  # Versão 0.4.24 = última tag 0.4.x no Docker Hub; compatível com o cliente
  # Python chromadb==0.4.18 (a versão do pip != tag de imagem Docker).
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: cij-chromadb
    profiles:
      - chromadb
    volumes:
      - chromadb_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - cij_internal

  # CLOUD-READINESS: coletor de tracing opcional. Sobe apenas com o profile
  # 'tracing' (docker compose --profile tracing up). Na nuvem, troque o
  # OTEL_EXPORTER_OTLP_ENDPOINT para um backend gerenciado (X-Ray/Tempo/Datadog).
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: tribunal-jaeger
    profiles:
      - tracing
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - cij_internal

volumes:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  vector_memory_data:
  chromadb_data:        # coleções RAG quando VECTOR_MEMORY_MODE=remote

networks:
  cij_internal:
    driver: bridge
  btv-prod-net:
    external: true
    name: btv-prod-net
