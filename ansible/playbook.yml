---
- name: Configure BuildToFlip v6 environment
  hosts: buildtoflip
  become: true
  vars:
    app_user: buildtoflip
    app_dir: /opt/buildtoflip
  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"

    - name: Deploy application configuration
      template:
        src: templates/application.yml.j2
        dest: "{{ app_dir }}/application.yml"
        owner: "{{ app_user }}"
        mode: "0644"

    - name: Start BuildToFlip services
      systemd:
        name: buildtoflip
        state: started
        enabled: true
